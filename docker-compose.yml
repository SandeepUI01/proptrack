services:
  backend:
    build: ./backend
    container_name: proptrack-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
    restart: always

  frontend:
    build: ./frontend
    container_name: proptrack-ui
    ports:
      - "8081:80" # Maps your browser http://localhost to Nginx inside the container
    depends_on:
      - backend
    restart: always
